services:
  aios:
    container_name: aios
    build:
      context: .
      dockerfile: Dockerfile
    image: aios:latest
    ports:
      - "${AIOS_PORT:-4000}:4000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/aios.db
      WORKSPACE_BASE_PATH: /app/workspace
      PROJECTS_PATH: /app/workspace/projects
      # Set this if OpenClaw runs on the host machine:
      # OPENCLAW_GATEWAY_URL: ws://host.docker.internal:18789
    volumes:
      - aios-data:/app/data
      - aios-workspace:/app/workspace
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aios.rule=Host(`${AIOS_DOMAIN:-aios.automateai.ceo}`)"
      - "traefik.http.routers.aios.entrypoints=websecure"
      - "traefik.http.routers.aios.tls.certresolver=letsencrypt"
      - "traefik.http.services.aios.loadbalancer.server.port=4000"

volumes:
  aios-data:
  aios-workspace:
